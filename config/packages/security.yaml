security:
    # 🔐 Hash des mots de passe
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # 👤 Provider utilisateur
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider

            custom_authenticator: App\Security\UserAuthenticator
            entry_point: App\Security\UserAuthenticator

            logout:
                path: app_logout
                target: app_home

    # 🧠 Hiérarchie des rôles
    role_hierarchy:
        ROLE_ADMIN: [ROLE_USER, ROLE_AUTHOR]

    access_control:
        # 🔓 PUBLIC
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }

        # 📦 ARTICLES (lecture publique)
        - { path: ^/articles$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/articles/\d+$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/article/\d+/edit, roles: ROLE_USER }

        # 👤 USERS
        - { path: ^/users$, roles: ROLE_ADMIN }         # voir tous les users
        - { path: ^/users/\d+$, roles: ROLE_USER }      # profil (à affiner avec voter)

        # 📦 ARTICLES (modification)
        - { path: ^/articles, roles: ROLE_USER, methods: [POST, PUT, DELETE] }

        # 💬 CONVERSATIONS
        - { path: ^/conversations/create, roles: ROLE_USER }
        - { path: ^/conversations/\d+, roles: ROLE_USER }

        # 🔐 ADMIN & AUTHOR (tes routes existantes)
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/author, roles: ROLE_AUTHOR }

        

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10